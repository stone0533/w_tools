name: w_tools
description: "一个功能丰富的 Flutter 工具库，提供了多种实用工具和组件，帮助开发者快速构建高质量的 Flutter 应用。"
version: 1.0.0
homepage: https://www.lei0533.com

environment:
  sdk: ^3.10.3
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter

  get: ^4.7.3
  dio: ^5.9.2
  flutter_screenutil: ^5.9.3
  flutter_form_builder: ^10.3.0+2
  form_builder_validators: ^11.3.0
  bot_toast: ^4.1.3
  logger: ^2.6.2
  intl: ^0.20.2

  qr_code_scanner_plus: ^2.1.1
  badges: ^3.1.2
  pull_to_refresh: ^2.0.0

  encrypt: ^5.0.3
  crypto: ^3.0.7
  convert: ^3.1.2

  flutter_picker_plus: ^1.5.6

  flutter_dotenv: ^6.0.0
  shared_preferences: ^2.2.0
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

